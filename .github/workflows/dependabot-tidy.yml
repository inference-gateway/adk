---
name: Dependabot Tidy

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: dependabot-tidy-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  tidy:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Tidy all Go modules
        run: find . -name 'go.mod' -execdir go mod tidy \;

      - name: Collect tidy changes
        run: |
          git add -A
          mkdir -p tidy-artifact
          : > files.jsonl
          while IFS= read -r -d '' path; do
            case "${path##*/}" in
              go.mod | go.sum)
                jq -n --arg path "$path" --arg content "$(base64 -w0 "$path")" \
                  '{path: $path, content: $content}' >> files.jsonl
                ;;
              *)
                echo "::warning::ignoring unexpected changed file $path"
                ;;
            esac
          done < <(git diff --cached --name-only -z --diff-filter=d)
          jq -s '{files: .}' files.jsonl > tidy-artifact/tidy.json
          echo "collected $(jq '.files | length' tidy-artifact/tidy.json) changed module file(s)"

      - name: Upload tidy result
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dependabot-tidy
          path: tidy-artifact/tidy.json
          retention-days: 1
