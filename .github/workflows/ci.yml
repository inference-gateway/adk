---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.12.2
          args: --help

      - name: Install Mockgen
        run: go install go.uber.org/mock/mockgen@v0.6.0

      - name: Install generator tool
        run: go install github.com/inference-gateway/tools/cmd/generator@v0.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 'lts/*'

      - name: Install prettier
        run: npm install -g prettier

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Format Go files
        run: find . -name '*.go' -exec gofmt -w {} \;

      - name: Format markdown files
        run: find . -name '*.md' -exec prettier -w {} \;

      - name: Lint markdown examples
        run: markdownlint 'examples/**/*.md'

      - name: Tidy Go modules
        run: find . -name 'go.mod' -execdir go mod tidy \;

      - name: Run generate
        run: |
          generator -generator jsonrpc -package types schema.yaml types/generated_types.go
          go run ./cmd/generate-providers

      - name: Format generated markdown
        run: find . -name '*.md' -exec prettier -w {} \;

      - name: Check dirty
        run: git diff --exit-code

      - name: Run Lint
        run: golangci-lint run

      - name: Build
        run: go build .

      - name: Test
        run: go test -v ./...
